$font = Monospace

animations {
    enabled = false
}

background {
    monitor =
    color = rgba(17, 17, 17, 1.0)
}

input-field {
    monitor =
    size = 20%, 5%
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee)
    check_color = rgba(00ff99ee)
    fail_color = rgba(ff6633ee)
    font_color = rgb(143, 143, 143)

    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 24

    position = 250, -20
    halign = center
    valign = center
}
